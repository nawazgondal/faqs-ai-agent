<h1>FAQ AI Chatbot Dashboard</h1>

<div class="container">
  <div class="chat-window">
    <div class="messages">
      <div *ngFor="let msg of messages" [ngClass]="'message ' + msg.type">
        <div class="message-content">
          {{ msg.content }}
        </div>
        <div *ngIf="msg.relevantFaqs" class="relevant-faqs">
          <strong>Related FAQs:</strong>
          <ul>
            <li *ngFor="let faq of msg.relevantFaqs">
              <strong>Q:</strong> {{ faq.question }}<br>
              <strong>A:</strong> {{ faq.answer }}
            </li>
          </ul>
        </div>
      </div>
      <div *ngIf="loading" class="message bot">
        <div class="message-content">Thinking...</div>
      </div>
    </div>

    <div class="input-area">
      <input
        [(ngModel)]="userQuestion"
        (keyup.enter)="sendQuestion()"
        placeholder="Ask your question..."
        [disabled]="loading"
        type="text"
      >
      <button (click)="sendQuestion()" [disabled]="loading">Send</button>
    </div>
  </div>
</div>
