<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <defs>
    <radialGradient id="logoGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <circle cx="100" cy="100" r="100" fill="url(#logoGradient)"/>
  
  <!-- Inner Circle (lighter) -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- AI Brain Icon -->
  <g transform="translate(100, 80)">
    <!-- Neural nodes -->
    <circle cx="-20" cy="-10" r="6" fill="white"/>
    <circle cx="0" cy="-15" r="6" fill="white"/>
    <circle cx="20" cy="-10" r="6" fill="white"/>
    <circle cx="-15" cy="10" r="6" fill="white"/>
    <circle cx="15" cy="10" r="6" fill="white"/>
    
    <!-- Connections -->
    <line x1="-20" y1="-10" x2="0" y2="-15" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-15" x2="20" y2="-10" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="-20" y1="-10" x2="-15" y2="10" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-15" x2="-15" y2="10" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="-15" x2="15" y2="10" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="-10" x2="15" y2="10" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Chat Bubbles -->
  <g transform="translate(100, 130)">
    <!-- Left bubble -->
    <rect x="-35" y="-8" width="25" height="16" rx="4" fill="white" opacity="0.8"/>
    <polygon points="-10,-8 -12,-2 -8,-8" fill="white" opacity="0.8"/>
    
    <!-- Right bubble -->
    <rect x="10" y="-8" width="25" height="16" rx="4" fill="rgba(255,255,255,0.5)"/>
    <polygon points="35,-8 37,-2 33,-8" fill="rgba(255,255,255,0.5)"/>
  </g>
  
  <!-- Text Badge -->
  <text x="100" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="white" opacity="0.9">FAQ AI v1.0</text>
</svg>